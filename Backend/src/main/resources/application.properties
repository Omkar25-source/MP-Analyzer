spring.application.name=Students
spring.datasource.url=jdbc:mysql://localhost:3306/MP_ANALYZER
spring.datasource.username=root
spring.datasource.password=soham260206

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── JWT ────────────────────────────────────────────────────────────────────────
# Fallback value used when JWT_SECRET env var is not set (change in production!)
jwt.secret=${JWT_SECRET:studysync-super-secret-key-change-in-production-min32chars}
jwt.expiration=86400000

# ── Google OAuth2 ──────────────────────────────────────────────────────────────
# Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET env vars to enable Google login.
# Fallback "disabled" values prevent startup crash when env vars are not set.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ── GitHub OAuth2 ──────────────────────────────────────────────────────────────
# Set GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET env vars to enable GitHub login.
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
