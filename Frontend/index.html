<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySync - Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.1/dist/umd/lucide.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f1f5f9;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body,
        html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            /* Prevents scrollbars from background animation */
        }

        /* Animated Background */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: #f8fafc;
        }

        .shape {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .shape-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: #e0e7ff;
            border-radius: 50%;
        }

        .shape-2 {
            bottom: -10%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: #d1fae5;
            border-radius: 50%;
            animation-delay: -5s;
        }

        .shape-3 {
            top: 40%;
            left: 60%;
            width: 400px;
            height: 400px;
            background: #fef3c7;
            border-radius: 50%;
            animation-delay: -2s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, -50px) scale(1.1);
            }
        }

        /* Center Content Wrapper */
        .login-wrapper {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Glassmorphism Card */
        .auth-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 3rem 2.5rem;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo & Header */
        .brand-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .brand-icon {
            background: var(--primary-color);
            color: white;
            padding: 10px;
            border-radius: 12px;
            display: flex;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        /* Form Inputs */
        .form-floating>.form-control {
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background-color: rgba(255, 255, 255, 0.9);
        }

        .form-floating>.form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .form-floating>label {
            color: var(--text-muted);
            padding-left: 1rem;
        }

        /* Buttons */
        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 0.875rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px -5px rgba(99, 102, 241, 0.4);
        }

        /* Social Login */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider:not(:empty)::before {
            margin-right: 1em;
        }

        .divider:not(:empty)::after {
            margin-left: 1em;
        }

        .btn-social {
            background-color: white;
            border: 1px solid #e2e8f0;
            color: var(--text-dark);
            padding: 0.75rem;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-social:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
        }

        .auth-card.register-mode #loginSection {
            display: none;
        }

        .auth-card.register-mode #registerForm {
            display: block !important;
        }

        #registerForm {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Animated Background Elements -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-wrapper">
        <!-- Centered Login Card -->
        <div class="auth-card">

            <div class="brand-logo">
                <div class="brand-icon">
                    <i data-lucide="layout-dashboard" size="24"></i>
                </div>
                StudySync
            </div>
            <p class="auth-subtitle" id="authSubtitle">Welcome back! Please enter your details.</p>

            <div id="loginSection">
                <form id="loginForm">
                    <!-- Floating Label Input for Email -->
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                        <label for="floatingInput">Email address</label>
                    </div>

                    <!-- Floating Label Input for Password -->
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                        <label for="floatingPassword">Password</label>
                    </div>

                    <!-- Options -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-muted small" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-primary text-decoration-none small fw-medium">Forgot password?</a>
                    </div>

                    <!-- Main CTA -->
                    <div id="login-error" class="text-danger small mb-2" style="display:none;"></div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                </form>

                <div class="divider">or continue with</div>

                <!-- OAuth Social Buttons - redirect directly to Spring Security OAuth2 endpoints -->
                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <a href="http://localhost:8080/oauth2/authorization/google"
                           class="btn btn-social w-100" id="btn-google-login">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" alt="Google"> Google
                        </a>
                    </div>
                    <div class="col-6">
                        <a href="http://localhost:8080/oauth2/authorization/github"
                           class="btn btn-social w-100" id="btn-github-login">
                            <img src="https://www.svgrepo.com/show/512317/github-142.svg" width="20" alt="GitHub"> GitHub
                        </a>
                    </div>
                </div>

                <div class="text-center">
                    <p class="text-muted small mb-0">Don't have an account?
                        <a href="#" class="text-primary text-decoration-none fw-bold"
                           id="showRegister">Sign up</a></p>
                </div>
            </div>

            <!-- Register section (signup-only mode) -->
            <form id="registerForm" class="mt-3" novalidate>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="regEmail" placeholder="name@example.com" required>
                    <label for="regEmail">Email address</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="regPassword" placeholder="Password" required>
                    <label for="regPassword">Password</label>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="createAccountBtn">Create Account</button>
                <div id="reg-error" class="text-danger small mt-2" style="display:none;"></div>
                <div class="text-center mt-3">
                    <p class="text-muted small mb-0">Already have an account?
                        <a href="#" class="text-primary text-decoration-none fw-bold" id="showLogin">Sign in</a>
                    </p>
                </div>
            </form>

        </div>
    </div>

    <!-- Store must load before api.js -->
    <script src="Assets/js/store.js"></script>
    <script src="Assets/js/api.js"></script>

    <script>
        renderIcons();

        const authCard = document.querySelector('.auth-card');
        const subtitle = document.getElementById('authSubtitle');

        function setAuthMode(mode) {
            const isRegister = mode === 'register';
            if (!authCard) return;
            authCard.classList.toggle('register-mode', isRegister);
            if (subtitle) {
                subtitle.textContent = isRegister
                    ? 'Create your account to start using StudySync.'
                    : 'Welcome back! Please enter your details.';
            }
        }

                setAuthMode('login');

        /* -- Handle OAuth redirect: ?token=...&name=...&email=... -- */
        (function handleOAuthCallback() {
            const params = new URLSearchParams(window.location.search);
            const token  = params.get('token');
            const name   = params.get('name');
            const email  = params.get('email');
            if (token) {
                Api.setSession(token, { name, email });
                // Clean URL then go to dashboard
                history.replaceState({}, '', window.location.pathname);
                window.location.href = Api.getPostLoginPath();
            }
        })();

        /* -- Email / Password Login -- */
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email    = document.getElementById('floatingInput').value.trim();
            const password = document.getElementById('floatingPassword').value;
            const errEl    = document.getElementById('login-error');

            try {
                const data = await Api.login(email, password);
                if (data.success) {
                    window.location.href = Api.getPostLoginPath();
                } else {
                    if (errEl) { errEl.textContent = data.message; errEl.style.display = 'block'; }
                }
            } catch (err) {
                if (errEl) { errEl.textContent = 'Login failed. Is the backend running?'; errEl.style.display = 'block'; }
            }
        });

        /* -- Register -- */
        document.getElementById('showRegister').addEventListener('click', function (e) {
            e.preventDefault();
            setAuthMode('register');
        });

        document.getElementById('showLogin').addEventListener('click', function (e) {
            e.preventDefault();
            setAuthMode('login');
        });

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email    = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const errEl    = document.getElementById('reg-error');

            try {
                const data = await Api.register(email, password);
                if (data.success) {
                    window.location.href = Api.getPostLoginPath();
                } else {
                    errEl.textContent = data.message; errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = 'Registration failed.'; errEl.style.display = 'block';
            }
        });
    </script>
</body>

</html>
