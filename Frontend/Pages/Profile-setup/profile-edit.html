<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySync - Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.1/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="../../Assets/css/style.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --primary-color: #6366f1; --primary-hover: #4f46e5; --text-dark: #1e293b; --text-muted: #64748b; }
        body  { font-family: 'Inter', sans-serif; background: var(--bg-body, #f8fafc); }

        .profile-card {
            max-width: 600px;
            margin: 3rem auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 12px 40px -8px rgba(0,0,0,0.08);
            padding: 2.5rem;
            animation: slideUp 0.5s cubic-bezier(.16,1,.3,1);
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .avatar-circle {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: var(--primary-color);
            color: #fff;
            font-size: 1.8rem;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
        }
        .provider-badge {
            font-size: 0.72rem; font-weight: 600;
            padding: 2px 10px; border-radius: 20px;
            background: #e0e7ff; color: #4f46e5;
        }
        .form-control, .form-select {
            border-radius: 12px; border: 1px solid #e2e8f0;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99,102,241,.12);
        }
        .section-label {
            font-size: 0.75rem; font-weight: 700; letter-spacing: .06em;
            color: var(--text-muted); text-transform: uppercase; margin-bottom: .75rem;
        }
        .btn-save {
            background: var(--primary-color); color: #fff;
            border: none; border-radius: 12px;
            padding: 0.85rem 2rem; font-weight: 600; transition: all .2s;
        }
        .btn-save:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-back { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
        .btn-back:hover { color: var(--primary-color); }

        #toast-msg {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            background: #10b981; color: #fff;
            padding: .75rem 1.5rem; border-radius: 12px;
            font-weight: 600; font-size: .9rem;
            opacity: 0; transition: opacity .3s; z-index: 9999;
        }
        #toast-msg.show { opacity: 1; }
    </style>
</head>

<body>
    <div class="profile-card">

        <!-- Back link -->
        <div class="d-flex align-items-center justify-content-between mb-4">
            <a href="../Dashboard/Dashboard.html" class="btn-back d-flex align-items-center gap-2">
                <i data-lucide="arrow-left" size="16"></i> Back to Dashboard
            </a>
            <a href="profile-setup.html" class="btn-back d-flex align-items-center gap-2">
                <i data-lucide="user-cog" size="16"></i> Open Setup Wizard
            </a>
        </div>

        <!-- Avatar + header -->
        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="avatar-circle" id="avatarInitials">?</div>
            <div>
                <h5 class="fw-bold mb-0" id="headerName">Loading...</h5>
                <div class="d-flex align-items-center gap-2 mt-1">
                    <span class="text-muted small" id="headerEmail">-</span>
                    <span class="provider-badge" id="headerProvider">LOCAL</span>
                </div>
            </div>
        </div>

        <hr class="mb-4">

        <!-- Profile update form -->
        <form id="profileEditForm" novalidate>

            <!-- -- Basic Info -- -->
            <div class="section-label">Basic Info</div>

            <div class="mb-3">
                <label class="form-label fw-medium" for="editName">Full Name</label>
                <input type="text" class="form-control" id="editName"
                       placeholder="e.g. Arjun Singh" required maxlength="80">
                <div class="invalid-feedback">Please enter your name.</div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-medium" for="editEmail">Email Address</label>
                <input type="email" class="form-control" id="editEmail"
                       placeholder="you@example.com" required>
                <div class="form-text" id="emailHint"></div>
                <div class="invalid-feedback">Please enter a valid email.</div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-medium" for="editPhone">Phone (optional)</label>
                <input type="tel" class="form-control" id="editPhone"
                       placeholder="e.g. +91 9876543210" maxlength="20">
            </div>

            <!-- -- Academic Info -- -->
            <div class="section-label mt-2">Academic Info</div>

            <div class="row g-3 mb-4">
                <div class="col-6">
                    <label class="form-label fw-medium" for="editSemester">Semester</label>
                    <select class="form-select" id="editSemester">
                        <option value="">- Select -</option>
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                        <option value="7">Semester 7</option>
                        <option value="8">Semester 8</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label fw-medium" for="editBranch">Branch / Department</label>
                    <input type="text" class="form-control" id="editBranch"
                           placeholder="e.g. CSE, ECE, MECH" maxlength="60">
                </div>
            </div>

            <div id="form-error" class="alert alert-danger py-2 small" style="display:none;"></div>

            <div class="d-flex gap-3 align-items-center">
                <button type="submit" class="btn-save" id="saveBtn">
                    <i data-lucide="save" size="16" class="me-2"></i>Save Changes
                </button>
                <span class="text-muted small" id="saveStatus"></span>
            </div>
        </form>
    </div>

    <!-- Toast -->
    <div id="toast-msg">? Profile updated!</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../Assets/js/theme.js"></script>
    <script src="../../Assets/js/store.js"></script>
    <script src="../../Assets/js/api.js"></script>

    <script>
        renderIcons();

        /* -- Load current profile from backend -- */
        async function loadProfile() {
            try {
                const user = await Api.getMe();

                const initials = (user.name || 'U').trim()
                    .split(/\s+/).map(p => p[0].toUpperCase()).slice(0, 2).join('');
                document.getElementById('avatarInitials').textContent = initials;
                document.getElementById('headerName').textContent     = user.name  || '-';
                document.getElementById('headerEmail').textContent    = user.email || '-';
                document.getElementById('headerProvider').textContent = user.provider || 'LOCAL';

                document.getElementById('editName').value    = user.name     || '';
                document.getElementById('editEmail').value   = user.email    || '';
                document.getElementById('editPhone').value   = user.phone    || '';
                document.getElementById('editBranch').value  = user.branch   || '';

                // Set semester dropdown
                const semEl = document.getElementById('editSemester');
                if (user.semester) semEl.value = user.semester;

                if (user.provider !== 'LOCAL') {
                    document.getElementById('emailHint').textContent =
                        `Signed in via ${user.provider}. Email changes won't affect your OAuth provider.`;
                }

                // Sync into local Store for sidebar
                const local = Store.getUser();
                Store.saveUser({
                    ...local,
                    name: user.name, email: user.email,
                    semester: user.semester, branch: user.branch,
                });
            } catch (e) {
                document.getElementById('headerName').textContent = 'Error loading profile';
            }
        }

        loadProfile();

        /* -- Submit: PUT /api/user/profile -- */
        document.getElementById('profileEditForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const name     = document.getElementById('editName').value.trim();
            const email    = document.getElementById('editEmail').value.trim();
            const phone    = document.getElementById('editPhone').value.trim();
            const semester = document.getElementById('editSemester').value;
            const branch   = document.getElementById('editBranch').value.trim();
            const errEl    = document.getElementById('form-error');
            const saveBtn  = document.getElementById('saveBtn');

            errEl.style.display = 'none';
            if (!name) {
                document.getElementById('editName').classList.add('is-invalid'); return;
            }
            document.getElementById('editName').classList.remove('is-invalid');

            saveBtn.disabled    = true;
            saveBtn.textContent = 'Saving...';

            try {
                const updated = await Api.updateProfile(name, email, phone, semester, branch);

                // Refresh avatar + header
                const initials = updated.name.trim()
                    .split(/\s+/).map(p => p[0].toUpperCase()).slice(0, 2).join('');
                document.getElementById('avatarInitials').textContent = initials;
                document.getElementById('headerName').textContent     = updated.name;
                document.getElementById('headerEmail').textContent    = updated.email;

                // Sync store so sidebar's user name refreshes
                const local = Store.getUser();
                Store.saveUser({
                    ...local,
                    name: updated.name, email: updated.email,
                    semester: updated.semester, branch: updated.branch,
                });

                // Toast
                const toast = document.getElementById('toast-msg');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2800);

            } catch (err) {
                errEl.textContent  = err.message || 'Update failed.';
                errEl.style.display = 'block';
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i data-lucide="save" size="16" class="me-2"></i>Save Changes';
                renderIcons();
            }
        });
    </script>
</body>

</html>
